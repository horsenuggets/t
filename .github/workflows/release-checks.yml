name: Release checks

on:
  pull_request:
    branches:
      - release

jobs:
  wally-auth:
    name: Verify Wally auth
    runs-on: ubuntu-latest
    steps:
      - name: Check WALLY_AUTH exists
        env:
          WALLY_AUTH: ${{ secrets.WALLY_AUTH }}
        run: |
          if [ -z "$WALLY_AUTH" ]; then
            echo "::error::WALLY_AUTH secret is not configured. Run: gh secret set WALLY_AUTH < ~/.wally/auth.toml"
            exit 1
          fi
          echo "WALLY_AUTH is configured."

  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $TITLE"

          # Must be "Release <version>" where version starts with a digit
          if [[ ! "$TITLE" =~ ^Release\ [0-9] ]]; then
            echo "::error::PR title must be 'Release <version>' (e.g., 'Release 3.1.1-horse.0.4')"
            exit 1
          fi

          echo "PR title is valid."

  diff-check:
    name: Verify diff matches main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff with main
        run: |
          git fetch origin master

          DIFF=$(git diff origin/master..HEAD)

          if [ -n "$DIFF" ]; then
            echo "::error::PR branch has changes that differ from main. The release branch must contain exactly what is in main."
            echo "Diff:"
            echo "$DIFF"
            exit 1
          fi

          echo "PR branch matches main exactly."

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check formatting
        run: lune run ./Submodules/luau-cicd/Scripts/CheckFormatting.luau

  json-format:
    name: Check JSON format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install -g prettier

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check JSON format
        run: lune run ./Submodules/luau-cicd/Scripts/CheckJsonFormat.luau

  version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check version match
        run: lune run ./Submodules/luau-cicd/Scripts/CheckVersionMatch.luau

      - name: Check changelog entry
        run: lune run ./Submodules/luau-cicd/Scripts/CheckChangelogVersion.luau

      - name: Check changelog format
        run: lune run ./Submodules/luau-cicd/Scripts/CheckChangelogFormat.luau

      - name: Verify PR title matches VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          EXPECTED_TITLE="Release $VERSION"
          ACTUAL_TITLE="${{ github.event.pull_request.title }}"

          if [ "$EXPECTED_TITLE" != "$ACTUAL_TITLE" ]; then
            echo "::error::PR title '$ACTUAL_TITLE' does not match VERSION file. Expected '$EXPECTED_TITLE'"
            exit 1
          fi

          echo "PR title matches VERSION file."
